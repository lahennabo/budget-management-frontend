<h2 mat-dialog-title>@if (budget.id) { Edit Budget } @else { New Budget }</h2>

<mat-dialog-content>
  <div class="form-container">
    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Name</mat-label>
      <input matInput [(ngModel)]="budget.name" [ngModelOptions]="{standalone: true}" required>
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Limit Amount</mat-label>
      <input matInput type="number" [(ngModel)]="budget.limitAmount" [ngModelOptions]="{standalone: true}" required min="0" step="0.01">
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Period (YYYY-MM)</mat-label>
      <input matInput [(ngModel)]="budget.period" [ngModelOptions]="{standalone: true}" required placeholder="2024-01">
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Category (Optional)</mat-label>

      <mat-select [(ngModel)]="budget.categoryId" [ngModelOptions]="{standalone: true}">
        <mat-option [value]="null">None</mat-option>
        @for (category of categories; track category.id) {
          <mat-option [value]="category.id">{{ category.name }}</mat-option>
        }
      </mat-select>

    </mat-form-field>
  </div>
</mat-dialog-content>

<!-- Si le backend attend uniquement l'identifiant (ex: categoryId) -->

<!--  <mat-option *ngFor="let cat of categories" [value]="cat.id">-->
<!--    {{ cat.name }}-->
<!--  </mat-option>-->
<!--</mat-select>-->

<mat-dialog-actions align="end">
  <button mat-button (click)="onCancel()">Cancel</button>
  <button mat-raised-button color="primary" (click)="onSave()">Save</button>
</mat-dialog-actions>
